<script>
const TASKS=[
  {id:'read',   name:'Read on my own',short:'Read',   note:'30 minutes'},
  {id:'khan',   name:'Khan Academy',  short:'Khan',   note:'30 minutes'},
  {id:'vocab',  name:'Vocabulary',    short:'Vocab',  note:'15 minutes'},
  {id:'korean', name:'Korean',        short:'Korean', note:''},
  {id:'cursive',name:'Cursive',       short:'Cursive',note:'1 page'},
  {id:'drill',  name:'Math drill',    short:'Math',   note:''},
  {id:'clean',  name:'Clean up',      short:'Clean',  note:'15 minutes'},
];
const TOTAL=TASKS.length;
const WINDOW=14;                 // days shown per screen

// Deployed Web App URL:
const GOOGLE_SYNC_URL = "https://script.google.com/macros/s/AKfycbxGC6kDDgCA4Jg9SlxmZF9YDL3Q8f8r7HpzxA8GI350sYDqeXkds0EhWGs9XyvJHatk/exec";

const pad=n=>String(n).padStart(2,'0');
const keyOf=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today=new Date(); today.setHours(0,0,0,0);
const todayKey=keyOf(today);

document.getElementById('date').textContent=
  today.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});

let records={};

const list=document.getElementById('list');
const meter=document.getElementById('meter');
const finish=document.getElementById('finish');

TASKS.forEach(t=>{
  const li=document.createElement('li');li.dataset.id=t.id;
  li.innerHTML=`<div class="box">✔</div><div class="task">${t.name}${t.note?`<span class="mins">${t.note}</span>`:''}</div>`;
  li.addEventListener('click',()=>toggleToday(t.id));
  list.appendChild(li);
  const pip=document.createElement('div');pip.className='pip';pip.dataset.id=t.id;meter.appendChild(pip);
});

function dayCount(k){const r=records[k];return r?Object.values(r).filter(Boolean).length:0;}

function paintToday(){
  const r=records[todayKey]||{};
  let c=0;
  TASKS.forEach(t=>{
    const on=!!r[t.id]; if(on)c++;
    list.querySelector(`li[data-id="${t.id}"]`).classList.toggle('done',on);
    meter.querySelector(`.pip[data-id="${t.id}"]`).classList.toggle('lit',on);
  });
  finish.classList.toggle('show',c===TOTAL);
}

async function save(){
  try{ await window.storage.set('records', JSON.stringify(records)); }catch(e){}
}

async function syncToGoogleSheet(dateKey, actionType) {
  if (!GOOGLE_SYNC_URL || GOOGLE_SYNC_URL.includes("YOUR_GOOGLE")) return;

  const r = records[dateKey] || {};

  // Query params match the Apps Script's e.parameter names exactly
  const params = new URLSearchParams({
    dateKey: dateKey,
    action: actionType,
    read: r.read ? 1 : 0,
    khan: r.khan ? 1 : 0,
    vocab: r.vocab ? 1 : 0,
    korean: r.korean ? 1 : 0,
    cursive: r.cursive ? 1 : 0,
    drill: r.drill ? 1 : 0,
    clean: r.clean ? 1 : 0
  });

  try {
    await fetch(`${GOOGLE_SYNC_URL}?${params.toString()}`, {
      method: "POST",
      mode: "no-cors"
    });
  } catch (err) {
    console.error("Google Sync networking failed: ", err);
  }
}

async function toggleToday(id){
  if(!records[todayKey])records[todayKey]={};
  records[todayKey][id]=!records[todayKey][id];
  paintToday(); 
  await save();
  syncToGoogleSheet(todayKey, "toggle");
}

document.getElementById('reset').addEventListener('click',async()=>{
  records[todayKey]={};
  paintToday(); 
  await save();
  syncToGoogleSheet(todayKey, "reset");
});

// tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const v=tab.dataset.v;
    document.getElementById('v-today').classList.toggle('on',v==='today');
    document.getElementById('v-history').classList.toggle('on',v==='history');
    if(v==='history') renderHabits();
  });
});

// ---- habit grid ----
let offset=0; 
const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function windowDays(){
  const days=[];
  const end=new Date(today); end.setDate(end.getDate()-offset*WINDOW);
  for(let i=WINDOW-1;i>=0;i--){const d=new Date(end);d.setDate(end.getDate()-i);days.push(d);}
  return days;
}

function computeStreak(){
  let s=0,d=new Date(today);
  if(dayCount(todayKey)<TOTAL)d.setDate(d.getDate()-1);
  while(dayCount(keyOf(d))===TOTAL){s++;d.setDate(d.getDate()-1);}
  return s;
}

function renderHabits(){
  document.getElementById('totDays').textContent=
    Object.keys(records).filter(k=>dayCount(k)===TOTAL).length;
  document.getElementById('curStreak').textContent=computeStreak();

  const days=windowDays();
  const first=days[0], last=days[days.length-1];
  const fmt=d=>d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  document.getElementById('rangeLabel').textContent=`${fmt(first)} – ${fmt(last)}`;
  document.getElementById('next').disabled = offset===0;

  const table=document.getElementById('habitTable');
  let html='<thead><tr><th class="corner">Task</th>';
  days.forEach(d=>{
    const wk=(d.getDay()===0||d.getDay()===6)?' wknd':'';
    html+=`<th class="${wk.trim()}">${DOWS[d.getDay()][0]}<br>${d.getDate()}</th>`;
  });
  html+='<th class="corner" style="min-width:44px">%</th></tr></thead><tbody>';
  TASKS.forEach(t=>{
    html+=`<tr><th>${t.name}</th>`;
    let hits=0;
    days.forEach(d=>{
      const k=keyOf(d);
      const on=!!(records[k]&&records[k][t.id]);
      if(on)hits++;
      const tc=(k===todayKey)?' todaycol':'';
      html+=`<td class="${on?'hit':''}${tc}" data-key="${k}" data-task="${t.id}"><div class="dot"></div></td>`;
    });
    const rate=Math.round(hits/days.length*100);
    html+=`<td class="rowrate">${rate}</td></tr>`;
  });
  html+='</tbody>';
  table.innerHTML=html;

  table.querySelectorAll('tbody td[data-key]').forEach(td => {
    const cleanTd = td.cloneNode(true);
    td.parentNode.replaceChild(cleanTd, td);

    cleanTd.addEventListener('click', () => {
      const k = cleanTd.dataset.key, id = cleanTd.dataset.task;
      if(!records[k]) records[k]={};
      records[k][id] = !records[k][id];
      save();
      if(k === todayKey) paintToday();
      renderHabits();
      syncToGoogleSheet(k, "history_edit");
    });
  });
}

document.getElementById('prev').addEventListener('click',()=>{offset++;renderHabits();});
document.getElementById('next').addEventListener('click',()=>{if(offset>0){offset--;renderHabits();}});

// ---- load ----
(async()=>{
  try{
    const r=await window.storage.get('records');
    if(r&&r.value) records=JSON.parse(r.value);
  }catch(e){ records={}; }
  paintToday();
})();
</script>
